// ============ GAME ENGINE ============
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 480; canvas.height = 320;

function fitCanvas(){
  const r = Math.min(window.innerWidth/480, window.innerHeight/320);
  canvas.style.width = (480*r)+'px';
  canvas.style.height = (320*r)+'px';
}
fitCanvas(); window.addEventListener('resize', fitCanvas);

// Load images
const images = {};
let imagesLoaded = 0, totalImages = 0;
for(let k in ASSETS){ totalImages++; }
for(let k in ASSETS){
  const img = new Image();
  img.onload = ()=>{ imagesLoaded++; if(imagesLoaded>=totalImages) startGame(); };
  img.onerror = ()=>{ imagesLoaded++; if(imagesLoaded>=totalImages) startGame(); };
  img.src = ASSETS[k];
  images[k] = img;
}

// Audio
let audioCtx = null;
let currentMelody = null;
function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}

function playNote(freq, start, dur, type='square', vol=0.08){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime+start);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+start+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(audioCtx.currentTime+start);
  o.stop(audioCtx.currentTime+start+dur);
}

let melodyTimer = null;
function stopMelody(){
  if(melodyTimer) clearInterval(melodyTimer);
  melodyTimer = null;
}

function playMelodyLoop(notes, bpm, type){
  stopMelody();
  const beatDur = 60/bpm;
  let i=0;
  function playBatch(){
    if(game.state==='transition'||!audioCtx) return;
    for(let j=0;j<notes.length;j++){
      playNote(notes[j][0], notes[j][1]*beatDur, notes[j][2]*beatDur, type||'square', 0.06);
    }
  }
  playBatch();
  const loopLen = notes.reduce((mx,n)=>Math.max(mx,n[1]+n[2]),0)*beatDur*1000;
  melodyTimer = setInterval(playBatch, loopLen);
}

let particles = [];
function spawnParticles(x,y,color,count,speed){
  for(let i=0;i<count;i++){

      life:1, color, size:2+Math.random()*3
    });

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=dt*2;
    if(p.life<=0) particles.splice(i,1);
  }
}

  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  ctx.globalAlpha=1;
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();

  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();ctx.fill();
}

function drawBigHeart(x,y,progress,t){

    ctx.strokeStyle='#220000';ctx.lineWidth=1+crackIntensity*2;
    ctx.beginPath();
    ctx.moveTo(0,-sz*0.15);
    ctx.lineTo(-3*crackIntensity,sz*0.0);
    ctx.lineTo(4*crackIntensity,sz*0.1);
    ctx.lineTo(-2*crackIntensity,sz*0.2);
    ctx.lineTo(3*crackIntensity,sz*0.3);
    ctx.lineTo(0,sz*0.4);
    ctx.stroke();
    // Side cracks
    if(crackIntensity>0.5){
      ctx.beginPath();
      ctx.moveTo(-3*crackIntensity,sz*0.0);
      ctx.lineTo(-sz*0.2*crackIntensity,-sz*0.05);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(4*crackIntensity,sz*0.1);
      ctx.lineTo(sz*0.25*crackIntensity,sz*0.05);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// Draw scrolling background
function drawBG(key, scrollX){
  if(!images[key]) return;
  const img=images[key];
  // Scale to fill height up to ground, maintain aspect ratio
  const drawH=GROUND_Y+5;
  const scale=drawH/(img.naturalHeight||320);
  const w=img.naturalWidth*scale;
  ctx.imageSmoothingEnabled=true;
  // Scroll BG but clamp so the right edge never shows (no ugly seam)
  const maxOffset=-(w-480); // don't scroll past end of image
  const rawOffset=-(scrollX*0.3);
  const offset=Math.max(maxOffset, rawOffset);
  ctx.drawImage(img,offset,0,w,drawH);
  // Only draw second copy if needed (image is narrower than screen)
  if(offset+w<480){
    ctx.drawImage(img,offset+w,0,w,drawH);
  }
}

// Draw character sprite
function drawCharacter(key,x,y,t){
  if(!images[key]) return;
  const img=images[key];
  const h=80;
  const w=h*(img.naturalWidth/img.naturalHeight);
  const bob=Math.sin(t*8)*3;
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(img,x-w/2,y-h+bob,w,h);
}

// ============ MAIN LOOP ============
let lastTime=0;
function gameLoop(timestamp){
  const dt=Math.min((timestamp-lastTime)/1000, 0.05);
  lastTime=timestamp;
  game.time+=dt;

  ctx.save();
  ctx.translate(shakeX,shakeY);
  updateShake(dt);

  if(game.state==='title') drawTitle();
  else if(game.state==='transition') drawTransition(dt);
  else if(game.state==='playing') updateAndDrawLevel(dt);
  else if(game.state==='airplane') drawAirplaneScene(dt);
  else if(game.state==='finale') drawFinale(dt);

  drawParticles();
  updateParticles(dt);
  ctx.restore();

  requestAnimationFrame(gameLoop);
}

function drawAirplaneScene(dt){
  // Physics update
  if(!game.planeCrash){
    game.airplaneTimer+=dt;
    game.planeVY+=120*dt; // gravity
    game.planeY+=game.planeVY*dt;
    if(game.planeY<40) {game.planeY=40;game.planeVY=0;}
    if(game.planeY>280) game.planeY=280;
  }
  const progress=Math.min(1,game.airplaneTimer/6);
  
  // Crash detection
  if(game.planeY>260 && !game.planeCrash){
    game.planeCrash=true;
    game.planeCrashTimer=1.5;
    startShake(0.5);
    spawnParticles(80+progress*320,game.planeY,'#ff6600',15,5);
  }
  
  // Crash recovery
  if(game.planeCrash){
    game.planeCrashTimer-=dt;
    if(game.planeCrashTimer<=0){
      game.planeCrash=false;
      game.airplaneTimer=0;
      game.planeY=160;
      game.planeVY=0;
    }
  }
  
  // Beautiful cloud background
  if(images.bg_flight){
    ctx.drawImage(images.bg_flight,0,0,480,320);
  }else{
    const grad=ctx.createLinearGradient(0,0,0,320);
    grad.addColorStop(0,'#b8c6db');grad.addColorStop(1,'#f5d0c5');
    ctx.fillStyle=grad;ctx.fillRect(0,0,480,320);
    // Ocean at bottom
    ctx.fillStyle='#2277cc';ctx.fillRect(0,270,480,50);
  }
  
  // Armenian flag on left
  ctx.font='24px serif';ctx.textAlign='center';
  ctx.fillText('🇦🇲',50,160);
  ctx.font='8px "Press Start 2P"';
  ctx.fillStyle='#fff';
  ctx.fillText('АРМЕНИЯ',50,185);
  
  // Uruguayan flag on right
  ctx.font='24px serif';
  ctx.fillText('🇺🇾',430,160);
  ctx.font='8px "Press Start 2P"';
  ctx.fillStyle='#fff';
  ctx.fillText('УРУГВАЙ',430,185);
  
  // Airplane position
  const ax=80+progress*320;
  const ay=game.planeY;
  
  // Hearts trail
  if(game.airplaneTimer>0.3 && Math.random()<0.3 && !game.planeCrash){
    particles.push({x:ax-20,y:ay,vx:-1-Math.random(),vy:-0.5+Math.random(),life:1.2,color:'#ff2255',size:3+Math.random()*3});
  }
  
  // Draw airplane with sprite
  if(!game.planeCrash){
    // Tilt based on velocity
    ctx.save();
    ctx.translate(ax,ay);
    const tilt=Math.max(-0.3,Math.min(0.3,game.planeVY*0.003));
    ctx.rotate(tilt);
    if(images.airplane_sprite){
      ctx.drawImage(images.airplane_sprite,-70,-55,140,110);
    }else{
      ctx.fillStyle='#fff';ctx.fillRect(-20,-5,40,12);
      ctx.fillStyle='#ddd';ctx.beginPath();ctx.moveTo(20,-5);ctx.lineTo(20,-15);ctx.lineTo(12,-5);ctx.fill();
    }
    ctx.restore();
  }
  
  // Window dots (only if not crashed)
  if(!game.planeCrash){
    ctx.fillStyle='#4da6ff';
    for(let w=0;w<4;w++) ctx.fillRect(ax-12+w*8,ay-2,3,3);
  }
  
  // Flight path dotted line
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(80,155);ctx.lineTo(400,155);ctx.stroke();
  ctx.setLineDash([]);
  
  // Progress bar
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(80,300,320,8);
  ctx.fillStyle='#ff2255';ctx.fillRect(80,300,320*progress,8);
  
  // Crash text
  if(game.planeCrash){
    ctx.fillStyle='#ff0000';ctx.font='14px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText('КРУШЕНИЕ!',240,150);
    ctx.fillStyle='#fff';ctx.font='8px "Press Start 2P"';
    ctx.fillText('Нажми чтобы лететь!',240,175);
  }else{
    // Instructions
    ctx.fillStyle='#fff';ctx.font='8px "Press Start 2P"';ctx.textAlign='center';
    ctx.globalAlpha=0.5+Math.sin(game.time*4)*0.3;
    ctx.fillText('✈ НАЖИМАЙ ЧТОБЫ ЛЕТЕТЬ ✈',240,280);
    ctx.globalAlpha=1;
  }
  
  // Transition after 6 seconds of flight
  if(game.airplaneTimer>=6 && !game.planeCrash){
    game.state='transition';
    game.transitionTimer=2;
    game.transitionText=LEVEL_NAMES[game.level];
    game.tatyanaJoined=false;
  }
}

function drawTitle(){
  ctx.fillStyle='#1a0a2e';ctx.fillRect(0,0,480,320);
  // stars
  for(let i=0;i<50;i++){
    const sx=(Math.sin(i*127.1+game.time*0.1)*0.5+0.5)*480;
    const sy=(Math.cos(i*311.7+game.time*0.05)*0.5+0.5)*320;
    ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(game.time*2+i)*0.3})`;
    ctx.fillRect(sx,sy,2,2);
  }
  ctx.fillStyle='#ff4466';ctx.font='14px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText('Виктор & Татьяна',240,100);
  drawHeart(240,140,30,'#ff2255');
  ctx.fillStyle='#ffd700';ctx.font='10px "Press Start 2P"';
  ctx.fillText('Оливер! 🍼',240,210);
  ctx.fillStyle='#fff';ctx.font='8px "Press Start 2P"';
  const blink=Math.sin(game.time*3)>0;
  if(blink) ctx.fillText('НАЖМИ ЧТОБЫ НАЧАТЬ',240,270);
  ctx.fillStyle='#aaa';ctx.font='7px "Press Start 2P"';
  ctx.fillText('от тёти Джулии ❤️',240,300);
}

function drawTransition(dt){
  ctx.fillStyle='#000';ctx.fillRect(0,0,480,320);
  ctx.fillStyle='#fff';ctx.font='14px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText(game.transitionText,240,160);
  game.transitionTimer-=dt;
  if(game.transitionTimer<=0){
    game.state='playing';
    startLevel(game.level);
  }
}

function startLevel(lvl){
  game.scrollX=0;
  player.y=GROUND_Y; player.vy=0; player.onGround=true;
  levelItems=getLevelItems(lvl);
  levelCollected=0;
  levelTotal=levelItems.length;
  tank=null;
  if(lvl===1) game.tatyanaJoined=false;
  if(lvl===0) spawnTank(0);
  if(lvl===1) spawnTank(1);
  // music
  if(lvl===0) playMelodyLoop(moscowMelody,140);
  else if(lvl===1) playMelodyLoop(armeniaMelody,70,'sine'); // sine = soft duduk
  else if(lvl===2) playMelodyLoop(uruguayMelody,130);
  // extra hearts for double mode
  if(game.doubleHearts && lvl===2){
    for(let i=0;i<10;i++){
      levelItems.push({type:'heart',x:1600+i*80,y:150+Math.sin(i)*25,collected:false});
    }
    levelTotal=levelItems.length;
  }
}

function updateAndDrawLevel(dt){
  // Scroll
  game.scrollX+=game.scrollSpeed;
  // Tank boss blocks forward progress until destroyed
  if(tank && tank.alive && (game.level===0||game.level===1)){
    const tankScreenX=tank.x-game.scrollX+60;
    const allCollected=levelItems.every(i=>i.collected||i.type==='airplane_pickup');
    if(allCollected && tankScreenX<200) game.scrollX=tank.x+60-200;
  }

  // Background
  const bgKey=LEVEL_BG[game.level];
  if(bgKey) drawBG(bgKey, game.scrollX);
  else { ctx.fillStyle='#1a0a2e';ctx.fillRect(0,0,480,320); }

  // Ground with texture per level
  if(game.level===2){
    // Uruguay: warm golden sand matching background
    ctx.fillStyle='#c4a265';ctx.fillRect(0,GROUND_Y,480,50);
    // Sand grain texture - subtle dots like cobblestone size
    ctx.fillStyle='#b89558';
    for(let i=0;i<18;i++){const gx=((i*30-game.scrollX*0.3)%560+560)%560-30;
      ctx.fillRect(gx+2,GROUND_Y+3,2,2);ctx.fillRect(gx+12,GROUND_Y+8,3,2);
      ctx.fillRect(gx+7,GROUND_Y+15,2,2);ctx.fillRect(gx+20,GROUND_Y+5,2,3);
      ctx.fillRect(gx+15,GROUND_Y+20,3,2);ctx.fillRect(gx+25,GROUND_Y+12,2,2);
    }
    ctx.fillStyle='#d4b070';ctx.fillRect(0,GROUND_Y,480,2);
  }else{
    // Moscow/Armenia: stone tile
    ctx.fillStyle='#8a8080';ctx.fillRect(0,GROUND_Y,480,50);
    ctx.strokeStyle='#6a6060';ctx.lineWidth=1;
    for(let i=0;i<18;i++){const gx=((i*30-game.scrollX*0.5)%560+560)%560-30;ctx.strokeRect(gx,GROUND_Y+1,28,22);ctx.strokeRect(gx+14,GROUND_Y+22,28,22);}
    ctx.fillStyle='#9a9090';ctx.fillRect(0,GROUND_Y,480,2);
  }

  // Jump
  if(jumpQueued && player.onGround){
    // Fireballs ONLY when: tank alive + on screen + all items collected
    const allItemsCollected=levelItems.every(i=>i.collected||i.type==='airplane_pickup');
    if(tank && tank.alive && (game.level===0||game.level===1) && allItemsCollected){
      const tx=tank.x-game.scrollX+60;
      if(tx<500 && tx>50){
        fireballs.push({x:player.x+20,y:GROUND_Y-50,vx:7,targetX:tx});
        if(audioCtx) playNote(600,0,0.05,'square',0.04);
      }else{
        player.vy=JUMP_FORCE;
      }
    }else{
      player.vy=JUMP_FORCE;
    }
    player.onGround=false;
    // jump sound
    if(audioCtx){playNote(600,0,0.1,'square',0.04);playNote(800,0.05,0.1,'square',0.03);}
    jumpQueued=false;
  }
  jumpQueued=false;

  // Physics
  player.vy+=GRAVITY;
  player.y+=player.vy;
  if(player.y>=GROUND_Y){player.y=GROUND_Y;player.vy=0;player.onGround=true;}

  // Draw characters
  const chars=LEVEL_CHARS[game.level];
  if(game.level===1){
    // Armenia: both characters always visible
    if(chars.length>=2){
      drawCharacter(chars[0],player.x-15,player.y,game.time);
      drawCharacter(chars[1],player.x+15,player.y,game.time);
    } else {
      drawCharacter(chars[0],player.x,player.y,game.time);
    }
  } else if(chars.length>=2){
    drawCharacter(chars[0],player.x-15,player.y,game.time);
    drawCharacter(chars[1],player.x+15,player.y,game.time);
  } else {
    drawCharacter(chars[0],player.x,player.y,game.time);
  }

  // Oliver running alongside
  if(game.oliverBorn && !game.oliverFalling){
    drawOliver(player.x+40,player.y-5+Math.sin(game.time*10)*2,20);
  }

  // Items
  for(const item of levelItems){
    if(item.collected) continue;
    const ix=item.x-game.scrollX;
    const iy=item.y+Math.sin(game.time*3+item.x*0.01)*5;
    if(ix<-50||ix>530) continue;

    // Draw item
    if(item.type==='heart'){ drawHeart(ix,iy-10,22); }
    else if(item.type==='ring'){ if(images.rings_sprite) ctx.drawImage(images.rings_sprite,ix-35,iy-35,70,70); else drawRing(ix,iy); }
    else if(item.type==='bouquet'){ if(images.bouquet_sprite) ctx.drawImage(images.bouquet_sprite,ix-40,iy-50,80,80); else drawBouquet(ix,iy); }
    else if(item.type==='car'){ if(images.car_sprite) ctx.drawImage(images.car_sprite,ix-60,iy-60,120,120); else drawCar(ix,iy); }
    else if(item.type==='pomegranate'){ if(images.pomegranate_sprite) ctx.drawImage(images.pomegranate_sprite,ix-15,iy-15,30,30); else drawPomegranate(ix,iy); }
    else if(item.type==='money') drawMoney(ix,iy);
    else if(item.type==='house'){ if(images.house_sprite) ctx.drawImage(images.house_sprite,ix-50,iy-60,100,100); else drawHouse(ix,iy); }
    else if(item.type==='badge') drawBadge(ix,iy,item.text);
    else if(item.type==='airplane_pickup'){
      // Invisible - auto-triggers airplane scene on collection
    }

    // Collision
    const dx=player.x-ix, dy=(player.y-40)-iy;
    if(Math.abs(dx)<25 && Math.abs(dy)<30){
      item.collected=true;
      levelCollected++;
      game.totalItemsCollected++;
      // collection effect - extra epic after Oliver!
      if(game.oliverBorn){
        spawnParticles(ix,iy,'#ff2255',4,5);
        spawnParticles(ix,iy,'#ffdd44',3,4);
        spawnParticles(ix,iy,'#44ddff',2,3);
        collectAnim.push({x:ix,y:iy,timer:0.7,text:'❤️'});
      }else{
        spawnParticles(ix,iy,'#ffdd44',8,3);
        collectAnim.push({x:ix,y:iy,timer:0.5,text:'+1'});
      }
      if(audioCtx){playNote(880,0,0.08,'square',0.05);playNote(1100,0.05,0.08,'square',0.04);}
      
      // Special ring sparkle
      if(item.type==='ring') spawnParticles(ix,iy,'#ffd700',15,5);
      // Tatyana joins when 500 РЕЗЮМЕ badge collected
      if(item.type==='badge' && item.text==='500 РЕЗЮМЕ' && game.level===1){
        game.tatyanaJoined=true;
        // Heart particle burst
        for(let h=0;h<20;h++){
          const angle=Math.random()*Math.PI*2;
          const spd=2+Math.random()*4;
          particles.push({x:player.x,y:player.y-40,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-2,life:1.5,color:'#ff2255',size:3+Math.random()*4});
        }
      }
      // Airplane pickup triggers airplane scene
      if(item.type==='airplane_pickup' && game.level===1){
        stopMelody();
        game.level++;
        game.state='airplane';
        game.airplaneTimer=0;
        game.airplaneX=0;
      }
    }
  }

  // Collection animations
  for(let i=collectAnim.length-1;i>=0;i--){
    const a=collectAnim[i];
    a.timer-=dt; a.y-=1;
    ctx.fillStyle='#fff';ctx.font='8px "Press Start 2P"';ctx.textAlign='center';
    ctx.globalAlpha=Math.max(0,a.timer*2);
    ctx.fillText(a.text,a.x,a.y);
    ctx.globalAlpha=1;
    if(a.timer<=0) collectAnim.splice(i,1);
  }

  // Tank (level 0)
  if(tank && tank.alive && (game.level===0||game.level===1)){
    tank.x+=Math.sin(game.time*0.5)*tank.speed;
    const tx=tank.x-game.scrollX+60;
    if(images.tank_sprite) ctx.drawImage(images.tank_sprite,tx-50,GROUND_Y-60,100,60); else drawTank(tx,GROUND_Y);
    // Health bar above tank
    const hbW=80,hbH=6,hbX=tx-hbW/2,hbY=GROUND_Y-75;
    ctx.fillStyle='#333';ctx.fillRect(hbX,hbY,hbW,hbH);
    ctx.fillStyle='#ff0000';ctx.fillRect(hbX,hbY,hbW*(tank.hp/tank.maxHp),hbH);
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(hbX,hbY,hbW,hbH);
    ctx.fillStyle='#fff';ctx.font='6px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText('БОСС '+tank.hp+'/'+tank.maxHp,tx,hbY-3);
    // Update & draw fireballs
    for(let i=fireballs.length-1;i>=0;i--){
      const fb=fireballs[i];
      fb.x+=fb.vx;
      // Draw fireball
      ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(fb.x,fb.y,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(fb.x,fb.y,3,0,Math.PI*2);ctx.fill();
      // Trail
      ctx.fillStyle='rgba(255,100,0,0.3)';ctx.beginPath();ctx.arc(fb.x-8,fb.y,4,0,Math.PI*2);ctx.fill();
      // Hit tank?
      if(Math.abs(fb.x-tx)<60){
        tank.hp--;
        spawnParticles(tx,GROUND_Y-30,'#ff6600',8,4);
        startShake(0.2);
        if(audioCtx) playNote(200-tank.hp*15,0,0.1,'square',0.06);
        fireballs.splice(i,1);
        if(tank.hp<=0){
          tank.alive=false;fireballs=[];
          startShake(1.0);
          // EXPLOSION
          spawnParticles(tx,GROUND_Y-20,'#ff6600',15,8);
          spawnParticles(tx,GROUND_Y-20,'#ffaa00',12,7);
          spawnParticles(tx,GROUND_Y-40,'#ff0000',10,6);
          // САЛЮТ / FIREWORKS!
          for(let s=0;s<5;s++){
            const fx=100+Math.random()*280, fy=30+Math.random()*100;
            spawnParticles(fx,fy,'#ff2255',6,6);
            spawnParticles(fx,fy,'#ffdd44',5,5);
            spawnParticles(fx,fy,'#44ddff',4,5);
            spawnParticles(fx,fy,'#44ff44',4,4);
          }
          if(audioCtx){
            playNote(100,0,0.3,'sawtooth',0.1);playNote(60,0.1,0.3,'sawtooth',0.08);
            // Victory fanfare!
            playNote(523,0.3,0.2,'square',0.06);playNote(659,0.5,0.2,'square',0.06);
            playNote(784,0.7,0.3,'square',0.07);playNote(1047,1.0,0.5,'square',0.08);
          }
        }
        continue;
      }
      // Off screen?
      if(fb.x>500) fireballs.splice(i,1);
    }
    // Old stomp check (kept as backup)
    if(player.vy>0 && player.y<GROUND_Y && 
       Math.abs(player.x-tx)<80 && player.y>GROUND_Y-160){
      tank.hp--;
      player.vy=JUMP_FORCE*0.8;
      startShake(0.3);
      spawnParticles(tx,GROUND_Y-15,'#ff6600',8,4);
      if(audioCtx){playNote(200,0,0.15,'square',0.08);}
      if(tank.hp<=0){
        tank.alive=false;
        startShake(1.0);
        spawnParticles(tx,GROUND_Y-15,'#ff6600',15,8);
        spawnParticles(tx,GROUND_Y-15,'#ffaa00',12,7);
        // САЛЮТ!
        for(let s=0;s<5;s++){
          const fx=100+Math.random()*280, fy=30+Math.random()*100;
          spawnParticles(fx,fy,'#ff2255',6,6);
          spawnParticles(fx,fy,'#ffdd44',5,5);
          spawnParticles(fx,fy,'#44ddff',4,5);
          spawnParticles(fx,fy,'#44ff44',4,4);
        }
        if(audioCtx){
          playNote(100,0,0.3,'sawtooth',0.1);playNote(60,0.1,0.3,'sawtooth',0.08);
          playNote(523,0.3,0.2,'square',0.06);playNote(659,0.5,0.2,'square',0.06);
          playNote(784,0.7,0.3,'square',0.07);playNote(1047,1.0,0.5,'square',0.08);
        }
      }
    }
    // tank hits player
    if(tank.alive && Math.abs(player.x-tx)<50 && player.y>=GROUND_Y-5){
      // push player slightly - not deadly, just scary
      if(tx>player.x-10) player.x=Math.max(30,player.x-3);
    }
  }

  // Big heart progress
  if(levelTotal>0){
    const localProg=levelCollected/levelTotal;
    game.bigHeartProgress=Math.min(1,(game.totalItemsCollected)/(game.totalItemsInGame||1));
  }

  // Big heart UI - position depends on animation state
  if(!heartCenterAnim.active){
    // Normal: top-right corner, grows with progress
    drawBigHeart(440,45,game.bigHeartProgress,game.time);
    ctx.fillStyle='#fff';ctx.font='6px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText(Math.floor(game.bigHeartProgress*100)+'%',440,80);
  }

  // Trigger center animation on Uruguay when heart is big enough
  if(game.level===2 && (game.bigHeartProgress>=0.8 || game.scrollX > LEVEL_DIST[2]*0.85) && !game.oliverBorn && !heartCenterAnim.active){
    heartCenterAnim.active=true;
    heartCenterAnim.timer=0;
    heartCenterAnim.phase='moving';
    stopMelody();
    game.scrollSpeed=0; // pause scrolling
  }

  // Heart center animation sequence
  if(heartCenterAnim.active && !game.oliverBorn){
    heartCenterAnim.timer+=dt;
    const T=heartCenterAnim.timer;
    
    if(heartCenterAnim.phase==='moving'){
      // Move from corner to center over 1.5 seconds
      const p=Math.min(1,T/1.5);
      const ease=p*p*(3-2*p); // smooth ease
      const hx=440+(240-440)*ease;
      const hy=45+(140-45)*ease;
      const prog=game.bigHeartProgress+(1-game.bigHeartProgress)*ease*0.5;
      drawBigHeart(hx,hy,prog,game.time);
      if(p>=1){heartCenterAnim.phase='tapping';heartCenterAnim.timer=0;heartCenterAnim.taps=0;}
    }
    else if(heartCenterAnim.phase==='tapping'){
      // Giant heart in center - TAP TO CRACK!
      const tapProgress=Math.min(1,heartCenterAnim.taps/heartCenterAnim.maxTaps);
      const scale=4+tapProgress*5; // 30% bigger heart
      const shake=tapProgress>0.7?Math.sin(game.time*20)*3*tapProgress:0;
      const pulse=1+Math.sin(game.time*(4+tapProgress*8))*0.04*(1+tapProgress);
      
      ctx.save();ctx.translate(240+shake,140);ctx.scale(pulse*scale,pulse*scale);
      drawHeart(0,-(20*0.45),20,'#ff1144');
      
      // Cracks grow with taps
      if(tapProgress>0.1){
        const cp=tapProgress;
        ctx.strokeStyle='#330000';ctx.lineWidth=0.3+cp*0.7;
        ctx.beginPath();
        ctx.moveTo(0,-4);ctx.lineTo(-1.5*cp,-1);ctx.lineTo(2*cp,1.5);
        ctx.lineTo(-1*cp,3.5);ctx.lineTo(1.5*cp,5.5);ctx.lineTo(0,7);
        ctx.stroke();
        if(cp>0.4){
          ctx.beginPath();ctx.moveTo(-1.5*cp,-1);ctx.lineTo(-4*cp,-2);ctx.stroke();
          ctx.beginPath();ctx.moveTo(2*cp,1.5);ctx.lineTo(5*cp,0.5);ctx.stroke();
        }
        if(cp>0.7){
          ctx.beginPath();ctx.moveTo(-1*cp,3.5);ctx.lineTo(-5*cp,2.5);ctx.stroke();
          ctx.beginPath();ctx.moveTo(1.5*cp,5.5);ctx.lineTo(4*cp,6.5);ctx.stroke();
        }
      }
      ctx.restore();
      
      // "ТАП!" text - blinking
      if(tapProgress<1){
        const blink=Math.sin(game.time*6)>0;
        if(blink){
          ctx.fillStyle='#fff';ctx.font='bold 14px "Press Start 2P"';ctx.textAlign='center';
          ctx.fillText('ТАП!',240,145);
          ctx.font='7px "Press Start 2P"';
          ctx.fillText(heartCenterAnim.taps+'/'+heartCenterAnim.maxTaps,240,165);
        }
      }
      
      // Particles with each tap
      if(tapProgress>0.5 && Math.random()<tapProgress*0.3){
        spawnParticles(240+Math.random()*60-30,140+Math.random()*40-20,'#ff88aa',1,2);
      }
      
      // Heartbeat sound
      if(Math.floor(game.time*2)%2===0 && Math.floor((game.time-dt)*2)%2!==0 && audioCtx){
        playNote(80+tapProgress*40,0,0.15,'sine',0.04+tapProgress*0.04);
      }
      
      // When enough taps - SPLIT!
      if(heartCenterAnim.taps>=heartCenterAnim.maxTaps){
        heartCenterAnim.phase='splitting';heartCenterAnim.timer=0;
      }
    }
    else if(heartCenterAnim.phase==='splitting'){
      // Split open! Two halves fly apart, Oliver falls out
      const p=Math.min(1,T/1.5);
      const splitDist=p*120;
      const scale=3.5*(1-p*0.3);
      
      // Left half
      ctx.save();ctx.translate(240-splitDist,140-p*20);ctx.scale(scale,scale);ctx.rotate(-p*0.3);
      ctx.globalAlpha=1-p*0.7;
      drawHeart(0,-(20*0.45),20,'#ff1144');
      ctx.restore();ctx.globalAlpha=1;
      
      // Right half
      ctx.save();ctx.translate(240+splitDist,140-p*20);ctx.scale(scale,scale);ctx.rotate(p*0.3);
      ctx.globalAlpha=1-p*0.7;
      drawHeart(0,-(20*0.45),20,'#ff1144');
      ctx.restore();ctx.globalAlpha=1;
      
      // Oliver emerging from center!
      if(T>0.3){
        const oliverScale=Math.min(1,(T-0.3)/0.8);
        const oliverY=140+((GROUND_Y-10)-140)*Math.min(1,(T-0.3)/1.2);
        drawOliver(240,oliverY,48*oliverScale);
      }
      
      // MASSIVE particle burst
      if(T<0.3 && Math.random()<0.8){
        spawnParticles(240,140,'#ff2255',5,8);
        spawnParticles(240,140,'#ffdd44',3,6);
        spawnParticles(240,140,'#ff88cc',3,5);
      }
      
      if(T<0.1){
        startShake(1);
        if(audioCtx){
          playNote(523,0,0.2,'square',0.08);playNote(659,0.15,0.2,'square',0.08);
          playNote(784,0.3,0.3,'square',0.08);playNote(1047,0.5,0.5,'square',0.1);
        }
      }
      
      if(p>=1){
        game.oliverBorn=true;
        game.doubleHearts=true;
        heartCenterAnim.active=false;
        game.scrollSpeed=LEVEL_DIST[game.level]>0?2:0;
        // CELEBRATION! Massive hearts + confetti
        for(let i=0;i<25;i++){
          levelItems.push({type:'heart',x:game.scrollX+100+i*40,y:130+Math.sin(i)*40,collected:false});
          levelTotal++;
        }
        // Confetti explosion! (limited to prevent lag)
        for(let i=0;i<10;i++){
          spawnParticles(Math.random()*480,Math.random()*200,'#ff2255',1,5);
          spawnParticles(Math.random()*480,Math.random()*200,'#ffdd44',1,4);
          spawnParticles(Math.random()*480,Math.random()*200,'#44ddff',1,4);
          spawnParticles(Math.random()*480,Math.random()*200,'#44ff44',1,3);
        }
        spawnParticles(240,GROUND_Y-10,'#ff88aa',40,8);
        // Happy celebration music!
        playMelodyLoop(uruguayMelody,160);
      }
    }
  }

  // Level progress / completion
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(10,8,100,6);
  ctx.fillStyle='#44ff44';
  ctx.fillRect(10,8,Math.min(1,game.scrollX/LEVEL_DIST[game.level])*100,6);

  if(game.scrollX>=LEVEL_DIST[game.level]){
    // CELEBRATION before next level! Salute + confetti
    for(let s=0;s<5;s++){
      const fx=80+Math.random()*320, fy=20+Math.random()*100;
      spawnParticles(fx,fy,'#ff2255',5,5);
      spawnParticles(fx,fy,'#ffdd44',4,4);
      spawnParticles(fx,fy,'#44ddff',3,4);
      spawnParticles(fx,fy,'#44ff44',3,3);
    }
    stopMelody();
    const wasArmenia = game.level===1;
    game.level++;
    if(game.level>=3){
      game.state='finale'; game.finaleStep=0; game.finaleTimer=0; game.dialogIndex=0; game.dialogTimer=0;
      game.showCoupon=false; game.couponY=-200;
    } else if(wasArmenia){
      // Airplane transition from Armenia to Uruguay
      game.state='airplane'; game.airplaneTimer=0; game.airplaneX=0;
    } else {
      game.state='transition'; game.transitionTimer=2; game.transitionText=LEVEL_NAMES[game.level];
    }
  }
}

// ============ FINALE ============
const DIALOGS=[
  'Вы — пример любви и красоты!',
  'Голубочки, спасибо что вы вместе 💕',
  'Тётя Джулия приедет познакомиться!'
];

function drawFinale(dt){
  // Dark starry sky
  ctx.fillStyle='#0a0520';ctx.fillRect(0,0,480,320);
  for(let i=0;i<80;i++){
    const sx=(Math.sin(i*127.1)*0.5+0.5)*480;
    const sy=(Math.cos(i*311.7)*0.5+0.5)*250;
    ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(game.time*2+i)*0.4})`;
    ctx.fillRect(sx,sy,2,2);
  }

  // ground
  ctx.fillStyle='#2a1a3a';ctx.fillRect(0,GROUND_Y,480,80);

  game.finaleTimer+=dt;

  // Fireworks
  if(Math.random()<0.08){
    const fx=50+Math.random()*380, fy=30+Math.random()*120;
    const colors=['#ff4466','#44ff88','#4488ff','#ffdd44','#ff88ff','#88ffff'];
    spawnParticles(fx,fy,colors[Math.floor(Math.random()*colors.length)],12,5);
  }

  // Characters standing - drawn AFTER coupon so they appear on top
  // (moved to end of drawFinale)

  // Finale music (gentle)
  if(game.finaleStep===0){
    game.finaleStep=1;
    if(audioCtx){
      const mel=[[N.C4,0,1],[N.E4,1,1],[N.G4,2,1],[N.C5,3,2],[N.G4,5,1],[N.E4,6,1],[N.C4,7,2]];
      playMelodyLoop(mel,80,'triangle');
    }
  }

  // Dialogs (Undertale style)
  game.dialogTimer+=dt;
  if(game.dialogTimer>3.5 && game.dialogIndex<3) { game.dialogIndex++; game.dialogTimer=0; }

  if(game.dialogIndex<3 && !game.showCoupon){
    // dialog box
    ctx.fillStyle='#000';ctx.strokeStyle='#fff';ctx.lineWidth=2;
    roundRect(30,20,420,60,6);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='9px "Press Start 2P"';ctx.textAlign='center';
    // typewriter effect
    const txt=DIALOGS[game.dialogIndex];
    const chars=Math.floor(game.dialogTimer*15);
    ctx.fillText(txt.substring(0,chars),240,55);
  }

  // After dialogs, show coupon
  if(game.dialogIndex>=3 && !game.showCoupon && game.dialogTimer>1){
    game.showCoupon=true;
  }

  if(game.showCoupon){
    game.couponY=Math.min(50, game.couponY+2);
    const cy=game.couponY;
    // golden border
    ctx.fillStyle='#1a0a2e';
    roundRect(60,cy,360,180,8);
    ctx.strokeStyle='#ffd700';ctx.lineWidth=3;
    ctx.strokeRect(63,cy+3,354,174);
    ctx.strokeStyle='#ffec80';ctx.lineWidth=1;
    ctx.strokeRect(68,cy+8,344,164);

    ctx.textAlign='center';
    ctx.fillStyle='#ffd700';ctx.font='10px "Press Start 2P"';
    ctx.fillText('🎁 ПОДАРОЧНЫЙ КУПОН 🎁',240,cy+35);
    
    ctx.fillStyle='#ff4466';ctx.font='16px "Press Start 2P"';
    ctx.fillText('ДЕНЬГИ!',240,cy+70);
    
    ctx.fillStyle='#fff';ctx.font='7px "Press Start 2P"';
    ctx.fillText('Купите что-то для',240,cy+100);
    ctx.fillText('малыша! 💰👶',240,cy+115);
    
    ctx.fillStyle='#ff88aa';ctx.font='8px "Press Start 2P"';
    ctx.fillText('С любовью,',240,cy+145);
    ctx.fillText('тётя Джулия ❤️',240,cy+162);
  }

  // Characters ALWAYS drawn on top (after coupon)
  drawCharacter('victor_uruguay',180,GROUND_Y,game.time);
  drawCharacter('tatiana_uruguay',260,GROUND_Y,game.time);
  drawOliver(220,GROUND_Y-5+Math.sin(game.time*3)*2,28);
}

// ============ START ============
function startGame(){
  // Count total items
  for(let l=0;l<3;l++){
    game.totalItemsInGame+=getLevelItems(l).length;
  }
  game.totalItemsInGame+=10; // bonus hearts from Oliver
  game.state='title';
  requestAnimationFrame(gameLoop);
}
</script>
